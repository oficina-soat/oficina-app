name: Build Deploy App Lab

on:
  workflow_dispatch:

concurrency:
  group: lab-app
  cancel-in-progress: false

jobs:
  resolve_state:
    if: github.ref_name == 'main'
    name: resolve-state
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    environment:
      name: lab
    outputs:
      action_mode: ${{ steps.state.outputs.action_mode }}
      commit_sha: ${{ steps.state.outputs.commit_sha }}
      current_deployment_image: ${{ steps.state.outputs.current_deployment_image }}
      current_version: ${{ steps.state.outputs.current_version }}
      deployment_exists: ${{ steps.state.outputs.deployment_exists }}
      image_exists: ${{ steps.state.outputs.image_exists }}
      image_ref: ${{ steps.state.outputs.image_ref }}
      image_tag: ${{ steps.state.outputs.image_tag }}
      need_build: ${{ steps.state.outputs.need_build }}
      need_deploy: ${{ steps.state.outputs.need_deploy }}
      need_release: ${{ steps.state.outputs.need_release }}
      pull_request_url: ${{ steps.state.outputs.pull_request_url }}
      release_exists: ${{ steps.state.outputs.release_exists }}
      release_tag: ${{ steps.state.outputs.release_tag }}
      repository_name: ${{ steps.state.outputs.repository_name }}
      repository_url: ${{ steps.state.outputs.repository_url }}
      version_bump_required: ${{ steps.state.outputs.version_bump_required }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      ECR_REPOSITORY_NAME: ${{ vars.ECR_REPOSITORY_NAME || 'oficina' }}
      ECR_REPOSITORY_URL: ${{ vars.ECR_REPOSITORY_URL }}
      EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME || 'eks-lab' }}
      K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE || 'default' }}
      K8S_DEPLOYMENT_NAME: ${{ vars.K8S_DEPLOYMENT_NAME || 'oficina-app' }}
      K8S_CONTAINER_NAME: ${{ vars.K8S_CONTAINER_NAME || 'oficina-app' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup kubectl
        uses: azure/setup-kubectl@v5
        with:
          version: latest

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Resolve publish and deploy state
        id: state
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          set_output() {
            printf '%s=%s\n' "$1" "$2" >> "${GITHUB_OUTPUT}"
          }

          extract_version() {
            sed -n '0,/<version>[[:space:]]*/{
              s/.*<version>[[:space:]]*\([^<][^<]*\)[[:space:]]*<\/version>.*/\1/p
            }' "$1" | head -n 1
          }

          increment_patch_version() {
            local version="$1"
            local major=""
            local minor=""
            local patch=""
            local extra=""

            IFS='.' read -r major minor patch extra <<<"${version}"
            if [[ -n "${extra}" || ! "${major}" =~ ^[0-9]+$ || ! "${minor}" =~ ^[0-9]+$ || ! "${patch}" =~ ^[0-9]+$ ]]; then
              echo "Nao foi possivel incrementar automaticamente a versao ${version}. Use o formato semantico <major>.<minor>.<patch>." >&2
              exit 1
            fi

            printf '%s.%s.%s\n' "${major}" "${minor}" "$((patch + 1))"
          }

          image_tag_exists() {
            local error_file
            error_file="$(mktemp)"

            if aws --region "${AWS_REGION}" ecr describe-images \
              --repository-name "${repository_name}" \
              --image-ids imageTag="${image_tag}" >/dev/null 2>"${error_file}"; then
              rm -f "${error_file}"
              return 0
            fi

            if grep -q 'ImageNotFoundException' "${error_file}"; then
              rm -f "${error_file}"
              return 1
            fi

            cat "${error_file}" >&2
            rm -f "${error_file}"
            exit 1
          }

          open_bump_pr() {
            local base_version="$1"
            local target_version="$2"
            local branch_name="automation/manual-build-deploy-v${target_version}"
            local title="chore: incrementa versão para ${target_version}"
            local body=""
            local head_ref="${GITHUB_REPOSITORY_OWNER}:${branch_name}"
            local existing_pr_number=""
            local pr_url=""

            body="$(printf '%s\n\n%s\n%s\n%s\n\n%s\n' \
              "PR automático aberto pelo workflow Build Deploy App Lab." \
              "- Versão atual em main: ${base_version}" \
              "- Próxima versão necessária para publicação: ${target_version}" \
              "- Motivo: a release v${base_version} já existe, mas a imagem versionada não está mais disponível no ECR" \
              "Depois do merge deste PR em main, execute novamente o workflow Build Deploy App Lab para publicar a nova imagem e fazer o deploy.")"

            perl -0pi -e "s#<version>${base_version}</version>#<version>${target_version}</version>#" pom.xml

            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git checkout -b "${branch_name}"
            git add pom.xml
            git commit -m "chore: incrementa versão para ${target_version}"
            git push --force-with-lease origin "HEAD:refs/heads/${branch_name}"

            existing_pr_number="$(gh pr list \
              --repo "${GITHUB_REPOSITORY}" \
              --base main \
              --head "${head_ref}" \
              --state open \
              --json number \
              --jq '.[0].number // empty')"

            if [[ -n "${existing_pr_number}" ]]; then
              gh pr edit "${existing_pr_number}" \
                --repo "${GITHUB_REPOSITORY}" \
                --title "${title}" \
                --body "${body}" >/dev/null
              pr_url="$(gh pr view "${existing_pr_number}" --repo "${GITHUB_REPOSITORY}" --json url --jq '.url')"
            else
              pr_url="$(gh pr create \
                --repo "${GITHUB_REPOSITORY}" \
                --base main \
                --head "${branch_name}" \
                --title "${title}" \
                --body "${body}")"
            fi

            set_output action_mode open_bump_pr
            set_output commit_sha ""
            set_output current_deployment_image "${current_deployment_image}"
            set_output current_version "${target_version}"
            set_output deployment_exists "${deployment_exists}"
            set_output image_exists false
            set_output image_ref "${repository_url}:${target_version}"
            set_output image_tag "${target_version}"
            set_output need_build false
            set_output need_deploy false
            set_output need_release false
            set_output pull_request_url "${pr_url}"
            set_output release_exists true
            set_output release_tag "v${target_version}"
            set_output repository_name "${repository_name}"
            set_output repository_url "${repository_url}"
            set_output version_bump_required true
          }

          current_version="$(extract_version pom.xml)"
          if [[ -z "${current_version}" ]]; then
            echo "Nao foi possivel identificar project.version em pom.xml" >&2
            exit 1
          fi

          if [[ "${current_version}" == *-SNAPSHOT ]]; then
            echo "A versao fechada do app nao pode ser SNAPSHOT: ${current_version}" >&2
            exit 1
          fi

          release_tag="v${current_version}"
          chmod +x ./scripts/resolve-image-ref.sh
          APP_IMAGE_TAG="${current_version}" ./scripts/resolve-image-ref.sh >/tmp/image-ref.txt
          image_ref="$(cat /tmp/image-ref.txt)"
          repository_url="${image_ref%:*}"
          image_tag="${image_ref##*:}"
          repository_name="${repository_url#*/}"

          release_exists=false
          if gh release view "${release_tag}" >/dev/null 2>&1; then
            release_exists=true
          fi

          image_exists=false
          if image_tag_exists; then
            image_exists=true
          fi

          deployment_exists=false
          current_deployment_image=""
          if [[ "${release_exists}" == true && "${image_exists}" == false ]]; then
            next_version="${current_version}"
            while gh release view "v${next_version}" >/dev/null 2>&1; do
              next_version="$(increment_patch_version "${next_version}")"
            done
            open_bump_pr "${current_version}" "${next_version}"
            exit 0
          fi

          if ! aws --region "${AWS_REGION}" eks describe-cluster \
            --name "${EKS_CLUSTER_NAME}" >/dev/null 2>&1; then
            echo "Cluster EKS nao encontrado: ${EKS_CLUSTER_NAME}. Recrie ou reaplique a infra antes do deploy do app." >&2
            exit 1
          fi

          aws eks update-kubeconfig --region "${AWS_REGION}" --name "${EKS_CLUSTER_NAME}"

          if kubectl get deployment "${K8S_DEPLOYMENT_NAME}" --namespace "${K8S_NAMESPACE}" >/dev/null 2>&1; then
            deployment_exists=true
            current_deployment_image="$(
              kubectl get deployment "${K8S_DEPLOYMENT_NAME}" \
                --namespace "${K8S_NAMESPACE}" \
                -o jsonpath="{.spec.template.spec.containers[?(@.name=='${K8S_CONTAINER_NAME}')].image}"
            )"
          fi

          need_build=false
          need_release=false
          need_deploy=false
          action_mode=noop
          version_bump_required=false
          pull_request_url=""

          if [[ "${image_exists}" == false ]]; then
            need_build=true
          fi

          if [[ "${release_exists}" == false ]]; then
            need_release=true
          fi

          if [[ "${deployment_exists}" == false || "${current_deployment_image}" != "${image_ref}" ]]; then
            need_deploy=true
          fi

          if [[ "${need_build}" == true ]]; then
            action_mode=build_release_deploy
          elif [[ "${need_release}" == true && "${need_deploy}" == true ]]; then
            action_mode=create_release_deploy
          elif [[ "${need_release}" == true ]]; then
            action_mode=create_release_only
          elif [[ "${need_deploy}" == true ]]; then
            action_mode=deploy_only
          fi

          commit_sha="$(git rev-parse HEAD)"

          set_output action_mode "${action_mode}"
          set_output commit_sha "${commit_sha}"
          set_output current_deployment_image "${current_deployment_image}"
          set_output current_version "${current_version}"
          set_output deployment_exists "${deployment_exists}"
          set_output image_exists "${image_exists}"
          set_output image_ref "${image_ref}"
          set_output image_tag "${image_tag}"
          set_output need_build "${need_build}"
          set_output need_deploy "${need_deploy}"
          set_output need_release "${need_release}"
          set_output pull_request_url "${pull_request_url}"
          set_output release_exists "${release_exists}"
          set_output release_tag "${release_tag}"
          set_output repository_name "${repository_name}"
          set_output repository_url "${repository_url}"
          set_output version_bump_required "${version_bump_required}"

          printf 'Modo resolvido: %s\n' "${action_mode}"
          printf 'Release existe: %s\n' "${release_exists}"
          printf 'Imagem existe no ECR: %s\n' "${image_exists}"
          printf 'Deployment existe: %s\n' "${deployment_exists}"
          printf 'Imagem atual no deployment: %s\n' "${current_deployment_image:-<ausente>}"

  version_bump_required:
    if: github.ref_name == 'main' && needs.resolve_state.outputs.version_bump_required == 'true'
    name: version-bump-required
    runs-on: ubuntu-latest
    needs: resolve_state
    steps:
      - name: Stop and point to PR
        shell: bash
        run: |
          cat >&2 <<EOF
Nao e permitido reconstruir a mesma versao ja fechada em release quando a imagem sumiu do ECR.

Foi aberto um PR automatico para bump de versao:
${{ needs.resolve_state.outputs.pull_request_url }}

Faça o merge desse PR em main e execute novamente o workflow Build Deploy App Lab.
EOF
          exit 1

  publish_artifacts:
    if: github.ref_name == 'main' && needs.resolve_state.outputs.version_bump_required != 'true'
    name: publish-artifacts
    runs-on: ubuntu-latest
    needs: resolve_state
    permissions:
      contents: write
    environment:
      name: lab
    env:
      APP_VERSION: ${{ needs.resolve_state.outputs.current_version }}
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      ECR_REPOSITORY_NAME: ${{ vars.ECR_REPOSITORY_NAME || 'oficina' }}
      ECR_REPOSITORY_URL: ${{ vars.ECR_REPOSITORY_URL }}
      PUSH_LATEST_IMAGE: ${{ vars.PUSH_LATEST_IMAGE || 'false' }}
      RELEASE_TAG: ${{ needs.resolve_state.outputs.release_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.resolve_state.outputs.commit_sha }}

      - name: Setup Java
        if: needs.resolve_state.outputs.need_build == 'true'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Ensure mvnw is executable
        if: needs.resolve_state.outputs.need_build == 'true'
        run: chmod +x ./mvnw

      - name: Run full Maven verification
        if: needs.resolve_state.outputs.need_build == 'true'
        run: ./mvnw -B verify -DskipITs=false -DfailIfNoTests=false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Ensure scripts are executable
        if: needs.resolve_state.outputs.need_build == 'true'
        run: chmod +x ./scripts/build-image.sh ./scripts/push-image.sh

      - name: Build Docker image
        if: needs.resolve_state.outputs.need_build == 'true'
        run: ./scripts/build-image.sh "${{ needs.resolve_state.outputs.image_ref }}"

      - name: Push Docker image
        if: needs.resolve_state.outputs.need_build == 'true'
        run: ./scripts/push-image.sh "${{ needs.resolve_state.outputs.image_ref }}"

      - name: Optionally publish latest tag
        if: needs.resolve_state.outputs.need_build == 'true' && env.PUSH_LATEST_IMAGE == 'true'
        shell: bash
        run: |
          latest_ref="${{ needs.resolve_state.outputs.repository_url }}:latest"
          docker tag "${{ needs.resolve_state.outputs.image_ref }}" "${latest_ref}"
          ./scripts/push-image.sh "${latest_ref}"

      - name: Prepare image metadata
        if: needs.resolve_state.outputs.need_release == 'true'
        shell: bash
        run: |
          mkdir -p target
          {
            echo "artifact=oficina-app"
            echo "version=${APP_VERSION}"
            echo "release=${RELEASE_TAG}"
            echo "image=${{ needs.resolve_state.outputs.image_ref }}"
            echo "repository=${{ needs.resolve_state.outputs.repository_url }}"
            echo "tag=${{ needs.resolve_state.outputs.image_tag }}"
            echo "commit=${{ needs.resolve_state.outputs.commit_sha }}"
          } > target/oficina-app-image.txt

      - name: Create GitHub release
        if: needs.resolve_state.outputs.need_release == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${RELEASE_TAG}" \
            target/oficina-app-image.txt \
            --target "${{ needs.resolve_state.outputs.commit_sha }}" \
            --title "${RELEASE_TAG}" \
            --notes "Imagem oficina-app ${APP_VERSION}: ${{ needs.resolve_state.outputs.image_ref }}"

      - name: Upload image metadata
        if: needs.resolve_state.outputs.need_release == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: oficina-app-image
          path: target/oficina-app-image.txt
          if-no-files-found: error

      - name: Report no-op publish state
        if: needs.resolve_state.outputs.need_build != 'true' && needs.resolve_state.outputs.need_release != 'true'
        shell: bash
        run: |
          echo "Nenhum build ou release necessario para ${APP_VERSION}."

  deploy_app:
    if: github.ref_name == 'main' && needs.resolve_state.outputs.version_bump_required != 'true' && needs.resolve_state.outputs.need_deploy == 'true'
    name: deploy-app
    runs-on: ubuntu-latest
    needs:
      - resolve_state
      - publish_artifacts
    permissions:
      contents: read
    environment:
      name: lab
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME || 'eks-lab' }}
      IMAGE_REF: ${{ needs.resolve_state.outputs.image_ref }}
      K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE || 'default' }}
      K8S_DEPLOYMENT_NAME: ${{ vars.K8S_DEPLOYMENT_NAME || 'oficina-app' }}
      K8S_CONTAINER_NAME: ${{ vars.K8S_CONTAINER_NAME || 'oficina-app' }}
      K8S_ROLLOUT_TIMEOUT: ${{ vars.K8S_ROLLOUT_TIMEOUT || '300s' }}
      BOOTSTRAP_K8S_APP_IF_MISSING: ${{ vars.BOOTSTRAP_K8S_APP_IF_MISSING || 'true' }}
      K8S_APP_OVERLAY: ${{ vars.K8S_APP_OVERLAY || 'k8s/overlays/lab' }}
      K8S_DB_SECRET_NAME: ${{ vars.K8S_DB_SECRET_NAME || 'oficina-database-env' }}
      K8S_DATABASE_SECRET_ID: ${{ vars.K8S_DATABASE_SECRET_ID || 'oficina/lab/database/app' }}
      K8S_JWT_SECRET_NAME: ${{ vars.K8S_JWT_SECRET_NAME || 'oficina-jwt-keys' }}
      REQUIRE_K8S_DB_SECRET: ${{ vars.REQUIRE_K8S_DB_SECRET || 'true' }}
      JWT_SECRET_SOURCE: ${{ vars.JWT_SECRET_SOURCE || 'aws-secrets-manager' }}
      JWT_SECRET_NAME: ${{ vars.JWT_SECRET_NAME || 'oficina/lab/jwt' }}
      JWT_SECRET_PRIVATE_KEY_FIELD: ${{ vars.JWT_SECRET_PRIVATE_KEY_FIELD || 'privateKeyPem' }}
      JWT_SECRET_PUBLIC_KEY_FIELD: ${{ vars.JWT_SECRET_PUBLIC_KEY_FIELD || 'publicKeyPem' }}
      ROTATE_JWT_SECRET: ${{ vars.ROTATE_JWT_SECRET || 'false' }}
      REGENERATE_JWT: ${{ vars.REGENERATE_JWT || 'false' }}
      JWT_DIR: ${{ vars.JWT_DIR || '.tmp/jwt' }}
      API_GATEWAY_ID: ${{ vars.API_GATEWAY_ID || '' }}
      API_GATEWAY_NAME: ${{ vars.API_GATEWAY_NAME || '' }}
      OFICINA_AUTH_ISSUER: ${{ vars.OFICINA_AUTH_ISSUER || '' }}
      OFICINA_AUTH_JWKS_URI: ${{ vars.OFICINA_AUTH_JWKS_URI || '' }}
      OFICINA_AUTH_FORCE_LEGACY: ${{ vars.OFICINA_AUTH_FORCE_LEGACY || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.resolve_state.outputs.commit_sha }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v5
        with:
          version: latest

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Deploy app image to EKS
        run: |
          chmod +x ./scripts/deploy-k8s.sh
          ./scripts/deploy-k8s.sh

  report_noop:
    if: github.ref_name == 'main' && needs.resolve_state.outputs.version_bump_required != 'true' && needs.resolve_state.outputs.need_build != 'true' && needs.resolve_state.outputs.need_release != 'true' && needs.resolve_state.outputs.need_deploy != 'true'
    name: report-noop
    runs-on: ubuntu-latest
    needs:
      - resolve_state
      - publish_artifacts
    steps:
      - name: Report no-op
        run: |
          echo "Versao ${{ needs.resolve_state.outputs.current_version }} ja possui imagem no ECR, release criada e deployment alinhado no EKS."
