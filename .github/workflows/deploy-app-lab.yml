name: Deploy App Lab

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: lab-app
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  resolve_app_state:
    if: github.ref_name == 'main'
    name: resolve-app-state
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment:
      name: lab
    outputs:
      action_mode: ${{ steps.state.outputs.action_mode }}
      commit_sha: ${{ steps.state.outputs.commit_sha }}
      current_deployment_image: ${{ steps.state.outputs.current_deployment_image }}
      current_version: ${{ steps.state.outputs.current_version }}
      deployment_exists: ${{ steps.state.outputs.deployment_exists }}
      image_exists: ${{ steps.state.outputs.image_exists }}
      image_ref: ${{ steps.state.outputs.image_ref }}
      image_tag: ${{ steps.state.outputs.image_tag }}
      need_build: ${{ steps.state.outputs.need_build }}
      need_deploy: ${{ steps.state.outputs.need_deploy }}
      need_release: ${{ steps.state.outputs.need_release }}
      publish_relevant_change: ${{ steps.state.outputs.publish_relevant_change }}
      release_exists: ${{ steps.state.outputs.release_exists }}
      release_tag: ${{ steps.state.outputs.release_tag }}
      repository_name: ${{ steps.state.outputs.repository_name }}
      repository_url: ${{ steps.state.outputs.repository_url }}
      version_changed: ${{ steps.state.outputs.version_changed }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      ECR_REPOSITORY_NAME: ${{ vars.ECR_REPOSITORY_NAME || 'oficina' }}
      ECR_REPOSITORY_URL: ${{ vars.ECR_REPOSITORY_URL }}
      EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME || 'eks-lab' }}
      K8S_CONTAINER_NAME: ${{ vars.K8S_CONTAINER_NAME || 'oficina-app' }}
      K8S_DEPLOYMENT_NAME: ${{ vars.K8S_DEPLOYMENT_NAME || 'oficina-app' }}
      K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE || 'default' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup kubectl
        uses: azure/setup-kubectl@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Resolve AWS publish and deploy state
        id: state
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          set_output() {
            printf '%s=%s\n' "$1" "$2" >> "${GITHUB_OUTPUT}"
          }

          extract_version() {
            sed -n '0,/<version>[[:space:]]*/{
              s/.*<version>[[:space:]]*\([^<][^<]*\)[[:space:]]*<\/version>.*/\1/p
            }' "$1" | head -n 1
          }

          image_tag_exists() {
            local error_file
            error_file="$(mktemp)"

            if aws --region "${AWS_REGION}" ecr describe-images \
              --repository-name "${repository_name}" \
              --image-ids imageTag="${image_tag}" >/dev/null 2>"${error_file}"; then
              rm -f "${error_file}"
              return 0
            fi

            if grep -q 'ImageNotFoundException' "${error_file}"; then
              rm -f "${error_file}"
              return 1
            fi

            cat "${error_file}" >&2
            rm -f "${error_file}"
            exit 1
          }

          is_publish_relevant_path() {
            local path="$1"

            case "${path}" in
              .github/*|README.md|docs/*)
                return 1
                ;;
              *)
                return 0
                ;;
            esac
          }

          current_version="$(extract_version pom.xml)"
          if [[ -z "${current_version}" ]]; then
            echo "Nao foi possivel identificar project.version em pom.xml" >&2
            exit 1
          fi

          if [[ "${current_version}" == *-SNAPSHOT ]]; then
            echo "A versao fechada do app em main nao pode ser SNAPSHOT: ${current_version}" >&2
            exit 1
          fi

          version_changed=false
          publish_relevant_change=false
          if [[ "${{ github.event_name }}" == "push" && "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
            if git show "${{ github.event.before }}:pom.xml" > /tmp/base-pom.xml 2>/dev/null; then
              base_version="$(extract_version /tmp/base-pom.xml)"
              if [[ -n "${base_version}" && "${current_version}" != "${base_version}" ]]; then
                version_changed=true
              fi
            else
              version_changed=true
            fi

            while IFS= read -r changed_path; do
              if is_publish_relevant_path "${changed_path}"; then
                publish_relevant_change=true
                break
              fi
            done < <(git diff --name-only "${{ github.event.before }}" "${GITHUB_SHA}")
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            version_changed=true
            publish_relevant_change=true
          fi

          release_tag="v${current_version}"
          chmod +x ./scripts/resolve-image-ref.sh
          APP_IMAGE_TAG="${current_version}" ./scripts/resolve-image-ref.sh >/tmp/image-ref.txt
          image_ref="$(cat /tmp/image-ref.txt)"
          repository_url="${image_ref%:*}"
          image_tag="${image_ref##*:}"
          repository_name="${repository_url#*/}"

          release_exists=false
          if gh release view "${release_tag}" >/dev/null 2>&1; then
            release_exists=true
          fi

          image_exists=false
          if image_tag_exists; then
            image_exists=true
          fi

          if ! aws --region "${AWS_REGION}" eks describe-cluster --name "${EKS_CLUSTER_NAME}" >/dev/null 2>&1; then
            echo "Cluster EKS nao encontrado: ${EKS_CLUSTER_NAME}. A aplicacao depende da infra AWS ja existente antes do deploy." >&2
            exit 1
          fi

          aws eks update-kubeconfig --region "${AWS_REGION}" --name "${EKS_CLUSTER_NAME}"

          deployment_exists=false
          current_deployment_image=""
          if kubectl get deployment "${K8S_DEPLOYMENT_NAME}" --namespace "${K8S_NAMESPACE}" >/dev/null 2>&1; then
            deployment_exists=true
            current_deployment_image="$(
              kubectl get deployment "${K8S_DEPLOYMENT_NAME}" \
                --namespace "${K8S_NAMESPACE}" \
                -o jsonpath="{.spec.template.spec.containers[?(@.name=='${K8S_CONTAINER_NAME}')].image}"
            )"
          fi

          need_build=false
          need_release=false
          need_deploy=false
          action_mode=noop

          if [[ "${image_exists}" == false ]]; then
            need_build=true
          fi

          if [[ "${release_exists}" == false ]]; then
            need_release=true
          fi

          if [[ "${deployment_exists}" == false || "${current_deployment_image}" != "${image_ref}" ]]; then
            need_deploy=true
          fi

          if [[ "${{ github.event_name }}" == "push" &&
                "${publish_relevant_change}" == true &&
                "${version_changed}" == false &&
                ( "${need_build}" == true || "${need_release}" == true ) ]]; then
            printf '%s\n\n%s\n%s\n%s\n\n%s\n' \
              "Push em main exige nova publicacao, mas project.version nao mudou." \
              "Versao atual: ${current_version}" \
              "Release existe: ${release_exists}" \
              "Imagem existe no ECR: ${image_exists}" \
              "Incremente project.version em pom.xml antes de publicar novo build, release ou imagem." >&2
            exit 1
          fi

          if [[ "${need_build}" == true ]]; then
            action_mode=build_release_deploy
          elif [[ "${need_release}" == true && "${need_deploy}" == true ]]; then
            action_mode=create_release_deploy
          elif [[ "${need_release}" == true ]]; then
            action_mode=create_release_only
          elif [[ "${need_deploy}" == true ]]; then
            action_mode=deploy_only
          fi

          commit_sha="$(git rev-parse HEAD)"

          set_output action_mode "${action_mode}"
          set_output commit_sha "${commit_sha}"
          set_output current_deployment_image "${current_deployment_image}"
          set_output current_version "${current_version}"
          set_output deployment_exists "${deployment_exists}"
          set_output image_exists "${image_exists}"
          set_output image_ref "${image_ref}"
          set_output image_tag "${image_tag}"
          set_output need_build "${need_build}"
          set_output need_deploy "${need_deploy}"
          set_output need_release "${need_release}"
          set_output publish_relevant_change "${publish_relevant_change}"
          set_output release_exists "${release_exists}"
          set_output release_tag "${release_tag}"
          set_output repository_name "${repository_name}"
          set_output repository_url "${repository_url}"
          set_output version_changed "${version_changed}"

          printf 'Modo resolvido: %s\n' "${action_mode}"
          printf 'Release existe: %s\n' "${release_exists}"
          printf 'Imagem existe no ECR: %s\n' "${image_exists}"
          printf 'Deployment existe: %s\n' "${deployment_exists}"
          printf 'Imagem alvo: %s\n' "${image_ref}"
          printf 'Imagem atual no deployment: %s\n' "${current_deployment_image:-<ausente>}"
          printf 'Versao mudou no push: %s\n' "${version_changed}"
          printf 'Mudanca publicavel no push: %s\n' "${publish_relevant_change}"

  publish_artifacts:
    if: github.ref_name == 'main'
    name: publish-artifacts
    runs-on: ubuntu-latest
    needs: resolve_app_state
    permissions:
      contents: write
    environment:
      name: lab
    env:
      APP_VERSION: ${{ needs.resolve_app_state.outputs.current_version }}
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      ECR_REPOSITORY_NAME: ${{ vars.ECR_REPOSITORY_NAME || 'oficina' }}
      ECR_REPOSITORY_URL: ${{ vars.ECR_REPOSITORY_URL }}
      PUSH_LATEST_IMAGE: ${{ vars.PUSH_LATEST_IMAGE || 'false' }}
      RELEASE_TAG: ${{ needs.resolve_app_state.outputs.release_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve_app_state.outputs.commit_sha }}

      - name: Setup Java
        if: needs.resolve_app_state.outputs.need_build == 'true'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Ensure mvnw is executable
        if: needs.resolve_app_state.outputs.need_build == 'true'
        run: chmod +x ./mvnw

      - name: Run Maven verification before image build
        if: needs.resolve_app_state.outputs.need_build == 'true'
        run: ./mvnw -B verify -DskipITs=false -DfailIfNoTests=false

      - name: Configure AWS credentials
        if: needs.resolve_app_state.outputs.need_build == 'true'
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Ensure image scripts are executable
        if: needs.resolve_app_state.outputs.need_build == 'true'
        run: chmod +x ./scripts/build-image.sh ./scripts/push-image.sh

      - name: Build Docker image
        if: needs.resolve_app_state.outputs.need_build == 'true'
        run: ./scripts/build-image.sh "${{ needs.resolve_app_state.outputs.image_ref }}"

      - name: Push Docker image
        if: needs.resolve_app_state.outputs.need_build == 'true'
        run: ./scripts/push-image.sh "${{ needs.resolve_app_state.outputs.image_ref }}"

      - name: Optionally publish latest tag
        if: needs.resolve_app_state.outputs.need_build == 'true' && env.PUSH_LATEST_IMAGE == 'true'
        shell: bash
        run: |
          latest_ref="${{ needs.resolve_app_state.outputs.repository_url }}:latest"
          docker tag "${{ needs.resolve_app_state.outputs.image_ref }}" "${latest_ref}"
          ./scripts/push-image.sh "${latest_ref}"

      - name: Prepare image metadata
        if: needs.resolve_app_state.outputs.need_release == 'true'
        shell: bash
        run: |
          mkdir -p target
          {
            echo "artifact=oficina-app"
            echo "version=${APP_VERSION}"
            echo "release=${RELEASE_TAG}"
            echo "image=${{ needs.resolve_app_state.outputs.image_ref }}"
            echo "repository=${{ needs.resolve_app_state.outputs.repository_url }}"
            echo "tag=${{ needs.resolve_app_state.outputs.image_tag }}"
            echo "commit=${{ needs.resolve_app_state.outputs.commit_sha }}"
          } > target/oficina-app-image.txt

      - name: Create GitHub release
        if: needs.resolve_app_state.outputs.need_release == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Release ${RELEASE_TAG} ja existe; seguindo de forma idempotente."
            exit 0
          fi

          gh release create "${RELEASE_TAG}" \
            target/oficina-app-image.txt \
            --target "${{ needs.resolve_app_state.outputs.commit_sha }}" \
            --title "${RELEASE_TAG}" \
            --notes "Imagem oficina-app ${APP_VERSION}: ${{ needs.resolve_app_state.outputs.image_ref }}"

      - name: Upload image metadata
        if: needs.resolve_app_state.outputs.need_release == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: oficina-app-image
          path: target/oficina-app-image.txt
          if-no-files-found: error

      - name: Report no-op publish state
        if: needs.resolve_app_state.outputs.need_build != 'true' && needs.resolve_app_state.outputs.need_release != 'true'
        run: echo "Nenhum build, push de imagem ou release necessario para ${APP_VERSION}."

  deploy_app:
    if: github.ref_name == 'main' && needs.resolve_app_state.outputs.need_deploy == 'true'
    name: deploy-app
    runs-on: ubuntu-latest
    needs:
      - resolve_app_state
      - publish_artifacts
    permissions:
      contents: read
    environment:
      name: lab
    env:
      API_GATEWAY_ID: ${{ vars.API_GATEWAY_ID || '' }}
      API_GATEWAY_NAME: ${{ vars.API_GATEWAY_NAME || '' }}
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      BOOTSTRAP_K8S_APP_IF_MISSING: ${{ vars.BOOTSTRAP_K8S_APP_IF_MISSING || 'true' }}
      DB_INSTANCE_IDENTIFIER: ${{ vars.DB_INSTANCE_IDENTIFIER || 'oficina-postgres-lab' }}
      DB_NAME: ${{ vars.DB_NAME || 'app' }}
      EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME || 'eks-lab' }}
      IMAGE_REF: ${{ needs.resolve_app_state.outputs.image_ref }}
      JWT_DIR: ${{ vars.JWT_DIR || '.tmp/jwt' }}
      JWT_SECRET_NAME: ${{ vars.JWT_SECRET_NAME || 'oficina/lab/jwt' }}
      JWT_SECRET_PRIVATE_KEY_FIELD: ${{ vars.JWT_SECRET_PRIVATE_KEY_FIELD || 'privateKeyPem' }}
      JWT_SECRET_PUBLIC_KEY_FIELD: ${{ vars.JWT_SECRET_PUBLIC_KEY_FIELD || 'publicKeyPem' }}
      JWT_SECRET_SOURCE: ${{ vars.JWT_SECRET_SOURCE || 'aws-secrets-manager' }}
      K8S_APP_OVERLAY: ${{ vars.K8S_APP_OVERLAY || 'k8s/overlays/lab' }}
      K8S_CONTAINER_NAME: ${{ vars.K8S_CONTAINER_NAME || 'oficina-app' }}
      K8S_DATABASE_FALLBACK_TO_RDS_MASTER_SECRET: ${{ vars.K8S_DATABASE_FALLBACK_TO_RDS_MASTER_SECRET || 'true' }}
      K8S_DATABASE_SECRET_ID: ${{ vars.K8S_DATABASE_SECRET_ID || 'oficina/lab/database/app' }}
      K8S_DB_SECRET_NAME: ${{ vars.K8S_DB_SECRET_NAME || 'oficina-database-env' }}
      K8S_DEPLOYMENT_NAME: ${{ vars.K8S_DEPLOYMENT_NAME || 'oficina-app' }}
      K8S_JWT_SECRET_NAME: ${{ vars.K8S_JWT_SECRET_NAME || 'oficina-jwt-keys' }}
      K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE || 'default' }}
      K8S_ROLLOUT_TIMEOUT: ${{ vars.K8S_ROLLOUT_TIMEOUT || '300s' }}
      OFICINA_AUTH_FORCE_LEGACY: ${{ vars.OFICINA_AUTH_FORCE_LEGACY || 'false' }}
      OFICINA_AUTH_ISSUER: ${{ vars.OFICINA_AUTH_ISSUER || '' }}
      OFICINA_AUTH_JWKS_URI: ${{ vars.OFICINA_AUTH_JWKS_URI || '' }}
      OFICINA_MAGIC_LINK_BASE_URL: ${{ vars.OFICINA_MAGIC_LINK_BASE_URL || '' }}
      REGENERATE_JWT: ${{ vars.REGENERATE_JWT || 'false' }}
      REQUIRE_K8S_DB_SECRET: ${{ vars.REQUIRE_K8S_DB_SECRET || 'true' }}
      ROTATE_JWT_SECRET: ${{ vars.ROTATE_JWT_SECRET || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve_app_state.outputs.commit_sha }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Deploy app image to EKS
        run: |
          chmod +x ./scripts/deploy-k8s.sh
          ./scripts/deploy-k8s.sh

  report_noop:
    if: >
      github.ref_name == 'main' &&
      needs.resolve_app_state.outputs.need_build != 'true' &&
      needs.resolve_app_state.outputs.need_release != 'true' &&
      needs.resolve_app_state.outputs.need_deploy != 'true'
    name: report-noop
    runs-on: ubuntu-latest
    needs:
      - resolve_app_state
      - publish_artifacts
    steps:
      - name: Report no-op
        run: |
          echo "Versao ${{ needs.resolve_app_state.outputs.current_version }} ja possui release, imagem no ECR e deployment alinhado no EKS."
