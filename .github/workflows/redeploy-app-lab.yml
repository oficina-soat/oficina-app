name: Redeploy App Lab

on:
  workflow_dispatch:

concurrency:
  group: lab-app
  cancel-in-progress: false

jobs:
  resolve_app_release:
    if: github.ref_name == 'main'
    name: resolve-app-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      current_version: ${{ steps.version.outputs.current_version }}
      image_ref: ${{ steps.image.outputs.image_ref }}
      image_tag: ${{ steps.image.outputs.image_tag }}
      release_tag: ${{ steps.version.outputs.release_tag }}
      repository_name: ${{ steps.image.outputs.repository_name }}
      repository_url: ${{ steps.image.outputs.repository_url }}
    environment:
      name: lab
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      ECR_REPOSITORY_NAME: ${{ vars.ECR_REPOSITORY_NAME || 'oficina' }}
      ECR_REPOSITORY_URL: ${{ vars.ECR_REPOSITORY_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve app version
        id: version
        shell: bash
        run: |
          current_version="$(
            sed -n '0,/<version>[[:space:]]*/{
              s/.*<version>[[:space:]]*\([^<][^<]*\)[[:space:]]*<\/version>.*/\1/p
            }' pom.xml | head -n 1
          )"

          if [[ -z "${current_version}" ]]; then
            echo "Nao foi possivel identificar project.version em pom.xml" >&2
            exit 1
          fi

          {
            echo "current_version=${current_version}"
            echo "release_tag=v${current_version}"
          } >> "${GITHUB_OUTPUT}"

      - name: Validate GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.release_tag }}
        run: |
          gh release view "${RELEASE_TAG}" >/dev/null

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Resolve image reference
        id: image
        shell: bash
        env:
          APP_VERSION: ${{ steps.version.outputs.current_version }}
        run: |
          chmod +x ./scripts/resolve-image-ref.sh
          APP_IMAGE_TAG="${APP_VERSION}" ./scripts/resolve-image-ref.sh >/tmp/image-ref.txt
          cat /tmp/image-ref.txt

      - name: Validate ECR image
        shell: bash
        run: |
          aws --region "${AWS_REGION}" ecr describe-images \
            --repository-name "${{ steps.image.outputs.repository_name }}" \
            --image-ids imageTag="${{ steps.image.outputs.image_tag }}" >/dev/null

  deploy_app:
    if: github.ref_name == 'main'
    name: deploy-app
    runs-on: ubuntu-latest
    needs: resolve_app_release
    permissions:
      contents: read
    environment:
      name: lab
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME || 'eks-lab' }}
      IMAGE_REF: ${{ needs.resolve_app_release.outputs.image_ref }}
      K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE || 'default' }}
      K8S_DEPLOYMENT_NAME: ${{ vars.K8S_DEPLOYMENT_NAME || 'oficina-app' }}
      K8S_CONTAINER_NAME: ${{ vars.K8S_CONTAINER_NAME || 'oficina-app' }}
      K8S_ROLLOUT_TIMEOUT: ${{ vars.K8S_ROLLOUT_TIMEOUT || '300s' }}
      BOOTSTRAP_K8S_APP_IF_MISSING: ${{ vars.BOOTSTRAP_K8S_APP_IF_MISSING || 'true' }}
      K8S_APP_OVERLAY: ${{ vars.K8S_APP_OVERLAY || 'k8s/overlays/lab' }}
      K8S_DB_SECRET_NAME: ${{ vars.K8S_DB_SECRET_NAME || 'oficina-database-env' }}
      K8S_JWT_SECRET_NAME: ${{ vars.K8S_JWT_SECRET_NAME || 'oficina-jwt-keys' }}
      REQUIRE_K8S_DB_SECRET: ${{ vars.REQUIRE_K8S_DB_SECRET || 'true' }}
      JWT_SECRET_SOURCE: ${{ vars.JWT_SECRET_SOURCE || 'aws-secrets-manager' }}
      JWT_SECRET_NAME: ${{ vars.JWT_SECRET_NAME || 'oficina/lab/jwt' }}
      JWT_SECRET_PRIVATE_KEY_FIELD: ${{ vars.JWT_SECRET_PRIVATE_KEY_FIELD || 'privateKeyPem' }}
      JWT_SECRET_PUBLIC_KEY_FIELD: ${{ vars.JWT_SECRET_PUBLIC_KEY_FIELD || 'publicKeyPem' }}
      ROTATE_JWT_SECRET: ${{ vars.ROTATE_JWT_SECRET || 'false' }}
      REGENERATE_JWT: ${{ vars.REGENERATE_JWT || 'false' }}
      JWT_DIR: ${{ vars.JWT_DIR || '.tmp/jwt' }}
      API_GATEWAY_ID: ${{ vars.API_GATEWAY_ID || '' }}
      API_GATEWAY_NAME: ${{ vars.API_GATEWAY_NAME || '' }}
      OFICINA_AUTH_ISSUER: ${{ vars.OFICINA_AUTH_ISSUER || '' }}
      OFICINA_AUTH_JWKS_URI: ${{ vars.OFICINA_AUTH_JWKS_URI || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Redeploy app image to EKS
        run: |
          chmod +x ./scripts/deploy-k8s.sh
          ./scripts/deploy-k8s.sh
